[project]
name = "theo-conductor"
version = "0.1.0"
description = "Add your description here"
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "huggingface>=0.0.1",
    "huggingface-hub>=1.21.0",
    "numpy>=2.5.0",
    "openai>=2.44.0",
    "pyarrow>=24.0.0",
